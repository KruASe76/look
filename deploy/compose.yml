name: look

services:
  ts-sidecar:
    image: tailscale/tailscale:latest
    hostname: look-api
    environment:
      TS_AUTHKEY: ${X_TS_CLIENT_KEY}
      TS_EXTRA_ARGS: --advertise-tags=${X_TS_DEVICE_TAG}
      TS_SERVE_CONFIG: /config/serve.json
      TS_USERSPACE: false
      TS_STATE_DIR: /var/lib/tailscale
    configs:
      - source: ts-serve
        target: /config/serve.json
    volumes:
      - ts-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    restart: always

  backend:
    image: ghcr.io/kruase76/look:latest
    env_file:
      - .env
    volumes:
      - $IMAGE_DIR_HOST:$IMAGE_DIR:ro
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: always

  sing-box:
    image: ghcr.io/sagernet/sing-box:latest
    volumes:
      - ./config.json:/etc/sing-box/config.json
    command: run -c /etc/sing-box/config.json
    restart: always

  bot:
    image: ghcr.io/kruase76/look-bot:latest
    command: --polling
    env_file:
      - .env
    environment:
      BOT_PROXY: socks5://sing-box:1080
    depends_on:
      - sing-box
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_HOST}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_DEV_PORT}:5432
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.transport.ssl.enabled: "false"
      ELASTIC_USERNAME: ${ELASTIC_USERNAME}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      xpack.ml.enabled: "false"
    volumes:
      - elasticsearch:/usr/share/elasticsearch/data
    ports:
      - ${ELASTIC_DEV_PORT}:9200
    healthcheck:
      test: [
        "CMD-SHELL",
        "curl -fsSL -u ${ELASTIC_USERNAME}:${ELASTIC_PASSWORD} ${ELASTIC_HOST}/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"
      ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  ts-state:
  postgres:
  elasticsearch:

configs:
  ts-serve:
    content: |
      {
        "TCP": {
          "443": {
            "HTTPS": true
          }
        },
        "Web": {
          "$${TS_CERT_DOMAIN}:443": {
            "Handlers": {
              "/": {
                "Proxy": "http://backend:8000"
              }
            }
          }
        },
        "AllowFunnel": {
          "$${TS_CERT_DOMAIN}:443": true
        }
      }
